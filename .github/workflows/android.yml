name: Android CI Build

on:
  push:
    branches: [ "رئيسي", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Find Project Root and Install Dependencies
      run: |
        # البحث التلقائي عن المجلد الذي يحتوي على ملف package.json لتفادي خطأ ENOENT
        PROJECT_ROOT=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
        if [ -z "$PROJECT_ROOT" ]; then
          echo "❌ خطأ: لم يتم العثور على ملف package.json في المستودع! تأكد من رفع ملفات مشروعك." && exit 1
        fi
        echo "PROJECT_PATH=$PROJECT_ROOT" >> $GITHUB_ENV
        echo "✅ تم العثور على مجلد المشروع في: $PROJECT_ROOT"
        cd "$PROJECT_ROOT"
        npm install --legacy-peer-deps

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build Android APK
      run: |
        cd "$PROJECT_PATH"
        
        # البحث التلقائي عن ملف gradlew لبناء التطبيق
        GRADLEW_PATH=$(find . -name "gradlew" -not -path "*/node_modules/*" | head -n 1)
        if [ -z "$GRADLEW_PATH" ] && [ -f "android/gradlew" ]; then
          GRADLEW_PATH="android/gradlew"
        fi
        
        if [ -z "$GRADLEW_PATH" ]; then
          echo "❌ خطأ: لم يتم العثور على ملف gradlew الخاص بالأندرويد!" && exit 1
        fi
        
        GRADLE_DIR=$(dirname "$GRADLEW_PATH")
        chmod +x "$GRADLEW_PATH"
        
        echo "🚀 بدء تجميع التطبيق من المجلد: $GRADLE_DIR"
        cd "$GRADLE_DIR" && ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hazari-App-Package
        path: "**/build/outputs/apk/debug/*.apk"
        

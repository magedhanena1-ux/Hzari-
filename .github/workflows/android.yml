name: Android CI Build

on:
  push:
    branches: [ "رئيسي", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        # قمنا بإلغاء سطر الكاش هنا لتفادي خطأ الـ lock file المفقود بنجاح

    - name: Install Dependencies
      run: npm install --legacy-peer-deps

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Grant execute permission for gradlew
      run: |
        if [ -f "gradlew" ]; then
          chmod +x gradlew
        elif [ -f "android/gradlew" ]; then
          chmod +x android/gradlew
        fi

    - name: Build Android APK (Debug)
      run: |
        if [ -f "gradlew" ]; then
          ./gradlew assembleDebug
        elif [ -d "android" ]; then
          cd android && ./gradlew assembleDebug
        else
          echo "مجلد الأندرويد أو ملف البناء غير موجود في المسار الرئيسي!" && exit 1
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Hazari-App-Package
        path: "**/build/outputs/apk/debug/*.apk" # بحث تلقائي ذكي عن ملف التطبيق أينما كان مساره
